    <title>問合せ票</title>
    <script src="https://cdn.tailwindcss.com" defer></script>

  <body class="bg-gray-100 min-h-screen py-10">
    <div class="max-w-[1000px] mx-auto px-4">
      <h1 class="text-2xl font-bold text-gray-800 mb-6">問合せ票</h1>

      <table class="w-full text-sm border-collapse" aria-label="問合せ票">

          <col style="width: 20%" />

          <col style="width: 20%" />

            </td>

            </td>
            <td class="px-2 py-1">
              <span class="font-bold">メール：</span> taro@example.com

            <td class="px-2 py-1">

                <tbody>
                  <tr>
                    <td
                      class="border border-gray-400 px-2 py-1 text-center font-bold bg-blue-600 text-white"

                      お届け先
                    </td>
                    <td colspan="2" class="border border-gray-400 px-2 py-1">

                      </div>

                        <span>見出し2</span>
                      </div>

                  </tr>
                  <tr>
                    <td
                      class="border border-gray-400 px-2 py-1 text-center font-bold"
                    >
                      ご依頼主
                    </td>
                    <td colspan="2" class="border border-gray-400 px-2 py-1">
                      <div class="flex items-center justify-between">
                        <span>見出し2</span>
                      </div>
                      <div class="flex items-center justify-between">
                        <span>見出し2</span>
                      </div>
                      <div class="flex items-center justify-between">
                        <span>見出し2</span>
                      </div>

                      </div>

                    <td class="border border-gray-400 px-2 py-1">項目D</td>
                    <td class="border border-gray-400 px-2 py-1">項目E</td>
                  </tr>
                  <tr>
