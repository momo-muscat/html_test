{% macro render_banner(text, text2="", text3="", color="gray") %}
<div x-data="{ open: false }" x-init="setTimeout(() => open = true, 100)" x-show="open"
    x-transition:enter="transition ease-out duration-500" x-transition:enter-start="opacity-0 scale-90"
    x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-300"
    x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-90"
    class="py-3 flex flex-col justify-center">

    <div
        class="mx-auto bg-white inset-x-5 p-5 bottom-40 rounded-lg drop-shadow-2xl flex gap-4 flex-wrap md:flex-nowrap text-center md:text-left items-center justify-center md:justify-between">
        <div class="w-full flex flex-col text-{{ color }}-700">
            <p>{{ text }}</p>
            {% if text2 %}
            <p>{{ text2 }}</p>
            {% endif %}
            {% if text3 %}
            <p>{{ text3 }}</p>
            {% endif %}
        </div>

        <div class="flex gap-4 items-center flex-shrink-0">
            <button @click="open = false"
                class="bg-indigo-500 px-5 py-2 text-white rounded-md hover:bg-indigo-700 focus:outline-none">
                ×</button>
        </div>
    </div>
</div>
{% endmacro %}
