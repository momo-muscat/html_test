<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>手書き伝票詳細</title>
        <script src="https://cdn.tailwindcss.com" defer></script>
    </head>
    <body class="bg-gray-100 min-h-screen py-10">
        <div class="flex-1">
            <div class="grid grid-cols-3 items-center w-full">
                <h2 class="mb-4 text-xl text-left font-bold">手書き伝票詳細</h2>
                <div></div>
            </div>

            <!-- ヘッダー情報 -->
            <div class="flex gap-10 mb-3 items-center">
                <div class="flex flex-col items-start">
                    <div>伝票番号</div>
                    <p class="font-bold text-lg">1234-5678-9012</p>
                </div>
                <div class="flex flex-col items-start">
                    <div>ヤマト伝票番号</div>
                    <p class="font-bold text-lg">1234-5678-9012</p>
                </div>
            </div>

            <!-- 詳細情報_1 -->
            <table class="table-fixed w-full text-sm mt-3">
                <colgroup>
                    <col class="w-[35%]" />
                    <col class="w-[35%]" />
                    <col class="w-[30%]" />
                </colgroup>
                <tbody>
                    <tr>
                        <!-- 詳細情報_1-1 店舗情報 -->
                        <td class="align-top pr-2.5">
                            <table
                                class="w-full table-fixed border border-blue-500 border-collapse"
                            >
                                <colgroup>
                                    <col class="w-[40%]" />
                                    <col class="w-[60%]" />
                                </colgroup>
                                <tbody>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-middle font-bold bg-blue-50"
                                        >
                                            店外店舗
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            岡山支店
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-middle font-bold bg-blue-50"
                                        >
                                            部門
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            ギフトセンター
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-middle font-bold bg-blue-50"
                                        >
                                            入力バッチ番号-連番
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            123456-5 (横持)
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>

                        <!-- 詳細情報_1-2 配送情報 -->
                        <td class="align-top pr-2.5">
                            <table
                                class="w-full table-fixed border border-blue-500 border-collapse"
                            >
                                <colgroup>
                                    <col class="w-[40%]" />
                                    <col class="w-[60%]" />
                                </colgroup>
                                <tbody>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-middle font-bold bg-blue-50"
                                        >
                                            配送業者
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            ゆうパック
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-middle font-bold bg-blue-50"
                                        >
                                            発送コメント
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            発送完了
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-middle font-bold bg-blue-50"
                                        >
                                            未発送理由
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            宛先不明
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>

                        <!-- 詳細情報_1-3 事故・再発行情報 -->
                        <td class="align-top">
                            <table
                                class="w-full table-fixed border border-blue-500 border-collapse"
                            >
                                <colgroup>
                                    <col class="w-[40%]" />
                                    <col class="w-[60%]" />
                                </colgroup>
                                <tbody>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-middle font-bold bg-blue-50"
                                        >
                                            事故
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            事故あり
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-middle font-bold bg-blue-50"
                                        >
                                            再発行伝票番号
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            1234-5678-9012
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- 詳細情報_2 -->
            <table class="table-fixed w-full text-sm mt-2.5">
                <colgroup>
                    <col class="w-[42%]" />
                    <col class="w-[42%]" />
                    <col class="w-[16%]" />
                </colgroup>
                <tbody>
                    <tr>
                        <!-- 詳細情報_2-1 出荷前履歴(社内履歴) -->
                        <td class="align-top pr-2.5">
                            <table
                                class="w-full table-fixed border border-blue-500 border-collapse"
                            >
                                <tbody>
                                    <tr>
                                        <td
                                            colspan="3"
                                            class="border border-blue-500 px-1 py-0.5 align-middle font-bold bg-blue-50"
                                        >
                                            出荷前履歴(社内履歴)
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-0.5 align-middle font-bold bg-blue-50 text-center"
                                        >
                                            日時
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-0.5 align-middle font-bold bg-blue-50 text-center"
                                        >
                                            状況
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-0.5 align-middle font-bold bg-blue-50 text-center"
                                        >
                                            備考
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            2025/11/15 11:31
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            伝票発行完了
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            ギフトセンター事務局
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>

                        <!-- 詳細情報_2-2 配送状況(配送業者履歴) -->
                        <td class="align-top pr-2.5">
                            <table
                                class="w-full table-fixed border border-blue-500 border-collapse"
                            >
                                <tbody>
                                    <tr>
                                        <td
                                            colspan="3"
                                            class="border border-blue-500 px-1 py-0.5 align-middle font-bold bg-blue-50"
                                        >
                                            配送状況(配送業者履歴)
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-0.5 align-middle font-bold bg-blue-50 text-center"
                                        >
                                            日時
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-0.5 align-middle font-bold bg-blue-50 text-center"
                                        >
                                            状況
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-0.5 align-middle font-bold bg-blue-50 text-center"
                                        >
                                            備考
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            2025/12/19 15:52
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            発送
                                        </td>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            ギフトセンター事務局
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>

                        <!-- 詳細情報_2-3 個口伝票 -->
                        <td class="align-top">
                            <table
                                class="w-full table-fixed border border-blue-500 border-collapse"
                            >
                                <tbody>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-0.5 align-middle font-bold bg-blue-50"
                                        >
                                            個口伝票
                                        </td>
                                    </tr>
                                    <tr>
                                        <td
                                            class="border border-blue-500 px-1 py-1 align-top"
                                        >
                                            &nbsp;
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </body>
</html>
